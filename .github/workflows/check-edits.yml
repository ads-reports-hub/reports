name: Apply manual report edits

on:
  schedule:
    # дважды в день, 12:00 и 20:00 по Праге (10:00 и 18:00 UTC, лето/CEST).
    # cron всегда в UTC и не учитывает переход на зимнее время - зимой (CET,
    # UTC+1) это будет 13:00 и 21:00 по Праге, на час позже. Для правок текста
    # разница в час не критична.
    - cron: '0 10,18 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  apply-edits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r engine/requirements.txt

      - name: Apply pending edits
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SHEET_WEBAPP_URL: ${{ secrets.SHEET_WEBAPP_URL }}
          SHEET_SHARED_SECRET: ${{ secrets.SHEET_SHARED_SECRET }}
        run: python engine/apply_edits.py

      - name: Commit and push updated reports
        if: always()
        run: |
          git config user.name "reports-bot"
          git config user.email "reports-bot@users.noreply.github.com"
          git add --ignore-errors docs/ _data/
          if git diff --cached --quiet; then
            echo "No report changes to commit"
          else
            git commit -m "Apply manual report edits $(date -u +%Y-%m-%dT%H:%M)"
            git push
          fi
