name: Monthly client reports

on:
  schedule:
    # 1-е число каждого месяца, 06:00 UTC
    - cron: '0 6 1 * *'
  workflow_dispatch:
    inputs:
      client:
        description: 'Слаг клиента для точечного прогона (пусто = все активные)'
        required: false
        default: ''
      since:
        description: 'Начало периода YYYY-MM-DD (для теста на прошлых данных, вместе с until)'
        required: false
        default: ''
      until:
        description: 'Конец периода YYYY-MM-DD'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r engine/requirements.txt

      - name: Run monthly orchestrator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SHEET_WEBAPP_URL: ${{ secrets.SHEET_WEBAPP_URL }}
          SHEET_SHARED_SECRET: ${{ secrets.SHEET_SHARED_SECRET }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.client }}" ]; then ARGS="$ARGS --client ${{ github.event.inputs.client }}"; fi
          if [ -n "${{ github.event.inputs.since }}" ]; then ARGS="$ARGS --since ${{ github.event.inputs.since }} --until ${{ github.event.inputs.until }}"; fi
          python engine/orchestrator.py $ARGS

      - name: Commit and push generated reports
        run: |
          git config user.name "reports-bot"
          git config user.email "reports-bot@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No new report files to commit"
          else
            git commit -m "Automated report run $(date -u +%Y-%m-%d)"
            git push
          fi
